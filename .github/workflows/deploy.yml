name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      restart_airflow:
        description: 'Restart Airflow'
        type: boolean
        default: false
      restart_bots:
        description: 'Restart all Cephalon bots'
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "airflow=$(echo "$CHANGED" | grep -q '^airflow/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "cephalon=$(echo "$CHANGED" | grep -q '^cephalon/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "discord=$(echo "$CHANGED" | grep -q '^discord/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Deploy Sport-Suite
        run: |
          rsync -a --omit-dir-times \
            --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='venv' --exclude='.venv' \
            --exclude='docker/backups/*' --exclude='airflow/logs/*' \
            --exclude='airflow/airflow.db' --exclude='airflow/airflow.cfg' \
            --exclude='nba/betting_xl/lines/*.json' \
            --exclude='nba/betting_xl/predictions/*.json' \
            --exclude='nba/features/datasets/*.csv' \
            --exclude='.env' --exclude='docker/.env' \
            --exclude='*.log' --exclude='*.pkl' \
            --exclude='CLAUDE.md' --exclude='.claude/' \
            ./ /home/sportsuite/sport-suite/

      - name: Deploy Cephalon module
        if: steps.changes.outputs.cephalon == 'true' || github.event.inputs.restart_bots == 'true'
        run: |
          rsync -a /home/sportsuite/sport-suite/cephalon/ /home/cephalons/cephalon/ \
            --exclude='__pycache__' --exclude='*.pyc'
          echo "Fleet module synced"

      - name: Verify
        run: |
          cd /home/sportsuite/sport-suite
          source venv/bin/activate
          python -c "import nba; print(f'Sport-Suite v{nba.__version__} — OK')"

      - name: Restart Airflow
        if: steps.changes.outputs.airflow == 'true' || github.event.inputs.restart_airflow == 'true'
        run: sudo systemctl restart airflow-scheduler airflow-webserver && echo "Airflow restarted"

      - name: Restart Axiom
        if: steps.changes.outputs.discord == 'true' || steps.changes.outputs.cephalon == 'true' || github.event.inputs.restart_bots == 'true'
        run: sudo systemctl restart cephalon-axiom && sleep 2 && sudo systemctl is-active cephalon-axiom

      - name: Restart Atlas
        if: steps.changes.outputs.cephalon == 'true' || github.event.inputs.restart_bots == 'true'
        run: sudo systemctl restart cephalon-atlas && sleep 2 && sudo systemctl is-active cephalon-atlas
