version: 2

sources:
  - name: nba_players
    description: Player data (players schema in consolidated DB)
    database: sportsuite
    schema: players
    tables:
      - name: player_game_logs
        description: Individual player game statistics
        columns:
          - name: player_id
            description: NBA player ID
          - name: game_id
            description: NBA game ID
          - name: game_date
            description: Date of the game
          - name: points
            description: Points scored
          - name: rebounds
            description: Total rebounds
          - name: assists
            description: Assists
          - name: minutes
            description: Minutes played

  - name: nba_intelligence
    description: Props and betting data (intelligence schema in consolidated DB)
    database: sportsuite
    schema: intelligence
    tables:
      - name: nba_props_xl
        description: Player prop lines from multiple sportsbooks
        columns:
          - name: id
            description: Auto-increment ID
          - name: player_name
            description: Player full name
          - name: stat_type
            description: Type of stat (POINTS, REBOUNDS, etc.)
          - name: over_line
            description: Sportsbook over line value
          - name: book_name
            description: Sportsbook name
